<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrique & Verónica - 24.10.2026</title>
    
    <!-- Fuentes Elegantes: Cormorant Garamond (Serif para títulos) y Montserrat (Sans para textos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN para prototipado rápido) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        'wedding-bg': '#FAFAFA',
                        'wedding-text': '#2D3748',
                        'wedding-accent': '#8C7A6B', // Un tono arena/champán sutil
                    }
                }
            }
        }
    </script>

    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        /* Estilos adicionales mínimos */
        body { background-color: #FAFAFA; color: #2D3748; }
        .hero-bg {
            /* Foto de fondo actualizada */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('./DSC08251-Editar.jpg');
            background-size: cover;
            background-position: center;
        }
        /* Input minimalista */
        .minimal-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #CBD5E0;
            padding: 0.75rem 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            transition: border-color 0.3s;
        }
        .minimal-input:focus {
            outline: none;
            border-bottom-color: #2D3748;
        }
    </style>
</head>
<body class="antialiased font-sans selection:bg-wedding-accent selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente: Cuenta Atrás
        const Countdown = () => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            useEffect(() => {
                const targetDate = new Date('2026-10-24T12:00:00').getTime();

                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetDate - now;

                    if (distance < 0) {
                        clearInterval(interval);
                        return;
                    }

                    setTimeLeft({
                        days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                        seconds: Math.floor((distance % (1000 * 60)) / 1000)
                    });
                }, 1000);

                return () => clearInterval(interval);
            }, []);

            return (
                <div className="flex justify-center gap-6 md:gap-12 text-white mt-12 font-serif tracking-widest">
                    <div className="text-center"><span className="block text-3xl md:text-5xl">{timeLeft.days}</span><span className="text-xs uppercase tracking-widest font-sans">Días</span></div>
                    <div className="text-center"><span className="block text-3xl md:text-5xl">{timeLeft.hours}</span><span className="text-xs uppercase tracking-widest font-sans">Hrs</span></div>
                    <div className="text-center"><span className="block text-3xl md:text-5xl">{timeLeft.minutes}</span><span className="text-xs uppercase tracking-widest font-sans">Min</span></div>
                    <div className="text-center"><span className="block text-3xl md:text-5xl">{timeLeft.seconds}</span><span className="text-xs uppercase tracking-widest font-sans">Seg</span></div>
                </div>
            );
        };

        // Componente: Navbar Sticky
        const Navbar = () => (
            <nav className="sticky top-0 w-full bg-wedding-bg/95 backdrop-blur-sm z-50 border-b border-stone-200">
                <div className="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center text-sm tracking-widest uppercase">
                    <a href="#inicio" className="font-serif font-bold text-lg hover:text-wedding-accent transition-colors">E & V</a>
                    <div className="hidden md:flex gap-8">
                        <a href="#detalles" className="hover:text-wedding-accent transition-colors">Detalles</a>
                        <a href="#logistica" className="hover:text-wedding-accent transition-colors">Logística</a>
                        <a href="#rsvp" className="hover:text-wedding-accent transition-colors">Asistencia</a>
                        <a href="#regalos" className="hover:text-wedding-accent transition-colors">Regalos</a>
                        <a href="#fotos" className="hover:text-wedding-accent transition-colors">Fotos</a>
                    </div>
                </div>
            </nav>
        );

        // Componente: Formulario RSVP
        const RsvpForm = () => {
            const [formData, setFormData] = useState({
                nombre: '',
                asiste: '',
                vieneAcompanado: false,
                nombreAcompanante: '',
                vieneConNinos: false,
                infoNinos: '',
                alergias: '',
                alojamiento: false,
                cancion: ''
            });
            const [submitted, setSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);

                try {
                    // 👉 REEMPLAZA ESTA URL por la que te dé Google Apps Script (o tu webhook de n8n)
                    const webhookUrl = 'https://script.google.com/macros/s/AKfycbxIFA80dvnVvQ96ZcECkGDkczJVbw3-8sFnQq576N6fYKrHXNrVRlK1YDrJ8LS2HHHQ_A/exec';
                    
                    if (webhookUrl === 'TU_WEBHOOK_URL_AQUI') {
                         console.log('Datos listos para enviar:', formData);
                         // Simulamos el envío de 1.5 segundos para que veas el efecto de carga
                         setTimeout(() => { setSubmitted(true); setLoading(false); }, 1500);
                         return;
                    }

                    // Hacemos la petición POST real
                    await fetch(webhookUrl, { 
                        method: 'POST', 
                        // Usamos text/plain para evitar errores de CORS (bloqueos de seguridad del navegador)
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(formData) 
                    });
                    
                    setSubmitted(true);
                } catch (error) {
                    console.error('Error enviando datos:', error);
                    alert("Hubo un error de conexión. Por favor, inténtalo de nuevo.");
                } finally {
                    setLoading(false);
                }
            };

            if (submitted) {
                return (
                    <div className="text-center py-12 animate-fade-in">
                        <h3 className="text-3xl font-serif italic mb-4">¡Gracias por confirmar!</h3>
                        <p className="font-light">Hemos registrado tu respuesta correctamente.</p>
                    </div>
                );
            }

            return (
                <form onSubmit={handleSubmit} className="max-w-2xl mx-auto flex flex-col gap-8 text-left">
                    {/* 1. Datos Básicos */}
                    <div>
                        <input type="text" name="nombre" value={formData.nombre} onChange={handleChange} required placeholder="Nombre y Apellidos" className="minimal-input" />
                    </div>

                    <div className="flex flex-col gap-4">
                        <p className="font-serif text-xl italic">¿Nos acompañarás en este día?</p>
                        <label className="flex items-center gap-3 cursor-pointer font-light">
                            <input type="radio" name="asiste" value="si" onChange={handleChange} required className="accent-wedding-text w-4 h-4" />
                            Sí, ¡no me lo pierdo!
                        </label>
                        <label className="flex items-center gap-3 cursor-pointer font-light">
                            <input type="radio" name="asiste" value="no" onChange={handleChange} required className="accent-wedding-text w-4 h-4" />
                            No, lamentablemente no podré ir.
                        </label>
                    </div>

                    {/* Si asiste, mostrar el resto de campos */}
                    {formData.asiste === 'si' && (
                        <div className="flex flex-col gap-8 animate-fade-in mt-4">
                            
                            {/* Acompañantes y Peques */}
                            <div className="space-y-4">
                                <label className="flex items-center gap-3 cursor-pointer font-light">
                                    <input type="checkbox" name="vieneAcompanado" checked={formData.vieneAcompanado} onChange={handleChange} className="accent-wedding-text w-4 h-4" />
                                    Vengo con acompañante
                                </label>
                                {formData.vieneAcompanado && (
                                    <input type="text" name="nombreAcompanante" value={formData.nombreAcompanante} onChange={handleChange} placeholder="Nombre del acompañante" className="minimal-input pl-6" />
                                )}

                                <label className="flex items-center gap-3 cursor-pointer font-light pt-2">
                                    <input type="checkbox" name="vieneConNinos" checked={formData.vieneConNinos} onChange={handleChange} className="accent-wedding-text w-4 h-4" />
                                    Vengo con peques
                                </label>
                                {formData.vieneConNinos && (
                                    <input type="text" name="infoNinos" value={formData.infoNinos} onChange={handleChange} placeholder="¿Cuántos niños y qué edades tienen?" className="minimal-input pl-6" />
                                )}
                            </div>

                            {/* Alergias */}
                            <div>
                                <input type="text" name="alergias" value={formData.alergias} onChange={handleChange} placeholder="Alergias, intolerancias o menús especiales (ej. vegano, sin legumbres)" className="minimal-input" />
                            </div>

                            {/* Alojamiento y Música */}
                            <div className="space-y-4 pt-4 border-t border-stone-200">
                                <label className="flex items-center gap-3 cursor-pointer font-light">
                                    <input type="checkbox" name="alojamiento" checked={formData.alojamiento} onChange={handleChange} className="accent-wedding-text w-4 h-4" />
                                    Estoy interesado/a en reservar alojamiento en la finca
                                </label>
                            </div>

                            <div>
                                <input type="text" name="cancion" value={formData.cancion} onChange={handleChange} placeholder="¿Qué canción no puede faltar en la fiesta?" className="minimal-input" />
                            </div>
                        </div>
                    )}

                    <button 
                        type="submit" 
                        disabled={loading}
                        className={`mt-8 border px-8 py-3 uppercase tracking-widest text-sm transition-colors self-center ${
                            loading 
                            ? 'border-stone-300 text-stone-400 cursor-not-allowed' 
                            : 'border-wedding-text text-wedding-text hover:bg-wedding-text hover:text-white'
                        }`}
                    >
                        {loading ? 'Enviando...' : 'Confirmar Asistencia'}
                    </button>
                </form>
            );
        };

        // Componente: Regalos
        const GiftSection = () => {
            const [copied, setCopied] = useState(false);
            const iban = "ESXX XXXX XXXX XXXX XXXX XXXX"; // SUSTITUIR POR VUESTRO IBAN REAL

            const handleCopy = () => {
                const textArea = document.createElement("textarea");
                textArea.value = iban;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Failed to copy', err);
                }
                document.body.removeChild(textArea);
            };

            return (
                <section id="regalos" className="py-24 text-center border-b border-stone-200">
                    <h2 className="text-4xl font-serif italic mb-8">Lista de Bodas</h2>
                    <p className="font-light leading-relaxed max-w-2xl mx-auto mb-8">
                        El mejor regalo para nosotros es poder compartir este día con todos vosotros. 
                        Pero si además queréis tener un detalle para ayudarnos con nuestra celebración, 
                        podéis hacerlo con un sobre (como Ábalos) o a través del siguiente número de cuenta:
                    </p>
                    <div className="flex flex-col items-center justify-center gap-4">
                        <div className="bg-stone-100/50 border border-stone-200 px-6 py-4 tracking-widest font-mono text-sm md:text-base text-wedding-text">
                            {iban}
                        </div>
                        <button 
                            onClick={handleCopy}
                            className="text-xs uppercase tracking-widest border-b border-wedding-text pb-1 hover:text-wedding-accent hover:border-wedding-accent transition-colors"
                        >
                            {copied ? '¡Copiado al portapapeles!' : 'Copiar número de cuenta'}
                        </button>
                    </div>
                </section>
            );
        };

        // Componente: Compartir Fotos
        const PhotoShareSection = () => {
            const albumUrl = "https://photos.app.goo.gl/9WMxCf7T449aeVJQ9";
            // Usamos una API gratuita y fiable para generar el QR en tiempo real
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(albumUrl)}&color=2D3748`;

            return (
                <section id="fotos" className="py-24 text-center border-t border-stone-200 bg-stone-50/50">
                    <h2 className="text-4xl font-serif italic mb-6">Comparte tus Fotos</h2>
                    <p className="font-light leading-relaxed max-w-2xl mx-auto mb-8 px-6">
                        Ayudadnos a guardar cada recuerdo de este día. Podéis subir vuestras fotos y vídeos al álbum compartido escaneando este código QR o haciendo clic en el enlace.
                    </p>
                    <div className="flex flex-col items-center justify-center gap-6">
                        <div className="p-4 bg-white border border-stone-200 shadow-sm">
                            <img src={qrUrl} alt="QR Álbum de Fotos" className="w-32 h-32 md:w-40 md:h-40 opacity-90" />
                        </div>
                        <a 
                            href={albumUrl} 
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="text-xs uppercase tracking-widest border-b border-wedding-text pb-1 hover:text-wedding-accent hover:border-wedding-accent transition-colors"
                        >
                            Abrir álbum en Google Photos
                        </a>
                    </div>
                </section>
            );
        };

        // Componente Principal
        const App = () => {
            return (
                <div className="relative">
                    {/* Hero Section */}
                    <header id="inicio" className="relative h-screen flex flex-col justify-center items-center text-center hero-bg">
                        <div className="z-10 px-6">
                            <h2 className="text-white text-sm md:text-base uppercase tracking-[0.3em] mb-4 font-sans font-light">Nos casamos</h2>
                            <h1 className="text-white text-6xl md:text-8xl font-serif italic mb-6">Enrique & Verónica</h1>
                            <p className="text-white text-lg md:text-xl font-light tracking-widest uppercase">24 de Octubre de 2026</p>
                            <Countdown />
                        </div>
                    </header>

                    <Navbar />

                    <main className="max-w-4xl mx-auto px-6">
                        {/* Dónde y Cuándo */}
                        <section id="detalles" className="py-24 text-center border-b border-stone-200">
                            <h2 className="text-4xl font-serif italic mb-8">Dónde y Cuándo</h2>
                            <p className="font-light leading-relaxed max-w-2xl mx-auto mb-12">
                                ¡Por fin llegó el momento! Nos encantaría que nos acompañaseis en este día tan especial. Lo celebraremos todo en la preciosa <strong className="font-medium">Finca Casas de Luján</strong>, rodeados de naturaleza.
                            </p>

                            <div className="aspect-video w-full max-w-3xl mx-auto overflow-hidden">
                                <iframe
                                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3062.697462118628!2d-2.840324323435756!3d39.85861247153483!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd682035baa0d3b7%3A0x903c13e611670755!2sCasas%20de%20Luj%C3%A1n%20%E2%80%93%20Finca%20para%20Bodas%20-%20Restaurante%20-%20Hotel%20rural!5e0!3m2!1ses!2ses!4v1779616921916!5m2!1ses!2ses"
                                    width="100%"
                                    height="100%"
                                    style={{border: 0, filter: 'grayscale(100%) contrast(1.2)'}}
                                    allowFullScreen=""
                                    loading="lazy"
                                    referrerPolicy="no-referrer-when-downgrade">
                                </iframe>
                            </div>
                            <p className="mt-4 font-serif text-xl">Saelices, Cuenca</p>
                        </section>

                        {/* Logística y Alojamiento */}
                        <section id="logistica" className="py-24 text-center border-b border-stone-200">
                            <h2 className="text-4xl font-serif italic mb-12">Logística y Alojamiento</h2>

                            <div className="grid md:grid-cols-2 gap-12 text-left">
                                <div>
                                    <h3 className="text-sm tracking-widest uppercase font-medium mb-4">Transporte</h3>
                                    <p className="font-light leading-relaxed">
                                        Al celebrarse a poca distancia de Madrid, hemos decidido no disponer de servicio de autobuses, por lo que el desplazamiento hasta la finca será por cuenta propia. Hay aparcamiento amplio disponible en el recinto.
                                    </p>
                                </div>
                                <div>
                                    <h3 className="text-sm tracking-widest uppercase font-medium mb-4">Alojamiento</h3>
                                    <p className="font-light leading-relaxed">
                                        Sabemos que a finales de octubre puede refrescar. Por vuestra comodidad (¡y sobre todo si venís con peques!), existe la posibilidad de alojarse en la propia finca. Así tendréis la habitación a un paso de la fiesta.
                                        <br/><br/>
                                        <em>Indicadlo en el formulario para que podamos gestionar las reservas.</em>
                                    </p>
                                </div>
                            </div>
                        </section>

                        {/* Formulario RSVP */}
                        <section id="rsvp" className="py-24 text-center">
                            <h2 className="text-4xl font-serif italic mb-4">Confirmar Asistencia</h2>
                            <p className="font-light mb-12 max-w-xl mx-auto">
                                Por favor, confirmad vuestra asistencia antes del 1 de Septiembre de 2026 para ayudarnos a organizarlo todo con tiempo.
                            </p>
                            
                            <RsvpForm />
                        </section>

                        {/* Lista de Bodas / Regalos */}
                        <GiftSection />

                        {/* Compartir Fotos */}
                        <PhotoShareSection />
                    </main>

                    <footer className="bg-stone-900 text-stone-400 text-center py-8 text-sm font-light">
                        <p>Enrique & Verónica &copy; 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
